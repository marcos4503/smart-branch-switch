name: "✏️ Documentation/ReadMe Change Proposal"
description: "Start a discussion as an existing or new Contributor, to propose a Documentation/ReadMe Change that you want to make."
title: "[DOCS] - "
labels: ["documentation"]
body:
  - type: markdown
    attributes:
      value: |
        > Don't delete the Tag. Try creating a descriptive title, but not an excessively long one.

        ### 👓 Thank you for your help with the project information!
        If you are an existing or a new **Contributor** wanting to propose a **Documentation/ReadMe Change**, this is the place. Open this Issue to discuss the change that you want to implement. Any contribution is welcome, even the smallest!

        - After discussing here, you can create a **new Branch** on this Repository (**or, if you're external**, Fork it to your account, then open a **new Branch** to work on the change).
        - After implementing the change in the new Branch, **open a Pull Request** referencing this Issue, in this Repository, to bring the change, officially.
        
        Please be as detailed as possible. :)

  - type: dropdown
    id: request_type
    attributes:
      label: "Scope of Change"
      description: "What is the scope of the change you intend to make?"
      options:
        - "☕ Just the main README.md"
        - "🏗️ Other MD/TXT/HTML files"
        - "🏗️ README.md and other MD/TXT/HTML files"
    validations:
      required: true

  - type: textarea
    id: change_details
    attributes:
      label: "Code Change Details"
      description: "Describe the Code Change. Why is it needed? What will be implemented? How should it be implemented?"
      placeholder: "I propose implementing/changing/refactoring..."
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: "Checks"
      options:
        - label: "I've already read the \"CONTRIBUTING.md\" file from this repository."
          required: true